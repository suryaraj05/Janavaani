version: "3.9"

# Run from backend/: docker compose -f infra/docker-compose.yml up --build
services:
  intake-api:
    build:
      context: .
      dockerfile: infra/Dockerfile
      args:
        SERVICE: intake-api
    ports: ["8080:8080"]
    env_file: .env
    environment:
      PORT: 8080
      ENRICH_WORKER_URL: http://enrich-worker:8081

  enrich-worker:
    build:
      context: .
      dockerfile: infra/Dockerfile
      args:
        SERVICE: enrich-worker
    ports: ["8081:8081"]
    env_file: .env
    environment:
      PORT: 8081

  connectors:
    build:
      context: .
      dockerfile: infra/Dockerfile
      args:
        SERVICE: connectors
    ports: ["8082:8082"]
    env_file: .env
    environment:
      PORT: 8082
      INTAKE_API_URL: http://intake-api:8080

  score-runner:
    build:
      context: .
      dockerfile: infra/Dockerfile
      args:
        SERVICE: score-runner
    ports: ["8083:8083"]
    env_file: .env
    environment:
      PORT: 8083
